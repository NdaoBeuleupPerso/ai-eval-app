<div class="container d-flex justify-content-center mt-4">
  <div class="col-10 card shadow p-4 border-0">
    <form name="editForm" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <h2 class="text-primary fw-bold mb-4"><fa-icon icon="file-import"></fa-icon> Nouvelle Soumission</h2>

      <jhi-alert-error></jhi-alert-error>

      <div class="row">
        <!-- Sélection de l'Appel d'Offre -->
        <div class="col-md-6 mb-3">
          <label class="form-label fw-bold" for="field_appelOffre">Appel d'Offre Cible</label>
          <select
            class="form-control rounded-pill"
            id="field_appelOffre"
            name="appelOffre"
            formControlName="appelOffre"
            [compareWith]="compareAppelOffre"
          >
            <option [ngValue]="null">-- Sélectionner un appel --</option>
            @for (ao of appelOffresSharedCollection; track ao.id) {
              <option [ngValue]="ao">{{ ao.reference }} - {{ ao.titre }}</option>
            }
          </select>
        </div>

        <!-- Sélection du Candidat -->
        <div class="col-md-6 mb-3">
          <label class="form-label fw-bold" for="field_candidat">Votre Entreprise</label>
          <select
            class="form-control rounded-pill"
            id="field_candidat"
            name="candidat"
            formControlName="candidat"
            [compareWith]="compareCandidat"
          >
            <option [ngValue]="null">-- Sélectionner votre profil --</option>
            @for (c of candidatsSharedCollection; track c.id) {
              <option [ngValue]="c">{{ c.nom }}</option>
            }
          </select>
        </div>

        <!-- Date et Statut (souvent auto-remplis) -->
        <div class="col-md-6 mb-3">
          <label class="form-label fw-bold">Date de Dépôt</label>
          <input type="datetime-local" class="form-control rounded-pill" formControlName="dateSoumission" />
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label fw-bold">État initial</label>
          <select class="form-control rounded-pill" formControlName="statut">
            @for (st of statutEvaluationValues; track st) {
              <option [value]="st">{{ st }}</option>
            }
          </select>
        </div>

        <!-- ZONE D'UPLOAD MULTIPLE -->
        <div class="col-12 mt-4 mb-4">
          <div class="p-4 border-dashed rounded-3 bg-light text-center">
            <fa-icon icon="cloud-upload-alt" size="3x" class="text-primary mb-2"></fa-icon>
            <h5>Documents de la Soumission (PDF, Word)</h5>
            <p class="small text-muted">Téléversez ici votre offre technique, financière et documents administratifs</p>
            <input type="file" multiple (change)="onFilesSelected($event)" class="form-control" accept=".pdf,.doc,.docx" />

            <!-- Liste des fichiers sélectionnés -->
            <div class="mt-3" *ngIf="fichiersSelectionnes.length > 0">
              <ul class="list-group list-group-flush">
                <li
                  *ngFor="let f of fichiersSelectionnes; let i = index"
                  class="list-group-item bg-transparent d-flex justify-content-between align-items-center"
                >
                  <span><fa-icon icon="file-pdf" class="text-danger me-2"></fa-icon> {{ f.nom }}</span>
                  <button type="button" class="btn btn-sm btn-link text-danger" (click)="removeFile(i)">
                    <fa-icon icon="trash-alt"></fa-icon>
                  </button>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top">
        <button type="button" class="btn btn-outline-secondary rounded-pill" (click)="previousState()">Annuler</button>
        <button
          type="submit"
          [disabled]="editForm.invalid || isSaving || fichiersSelectionnes.length === 0"
          class="btn btn-primary rounded-pill px-4"
        >
          <fa-icon icon="paper-plane"></fa-icon> Envoyer la Soumission
        </button>
      </div>
    </form>
  </div>
</div>
