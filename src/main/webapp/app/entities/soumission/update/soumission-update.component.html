<div class="d-flex justify-content-center">
  <div class="col-8">
    <form name="editForm" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <h2 id="jhi-soumission-heading" data-cy="SoumissionCreateUpdateHeading" jhiTranslate="iaevalApp.soumission.home.createOrEditLabel">
        Créer ou éditer un Soumission
      </h2>

      <div>
        <jhi-alert-error />

        @if (editForm.controls.id.value !== null) {
          <div class="mb-3">
            <label class="form-label" for="field_id" jhiTranslate="iaevalApp.soumission.id">ID</label>
            <input type="number" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
          </div>
        }

        <div class="mb-3">
          <label class="form-label" for="field_dateSoumission" jhiTranslate="iaevalApp.soumission.dateSoumission">Date Soumission</label>
          <div class="d-flex">
            <input
              id="field_dateSoumission"
              data-cy="dateSoumission"
              type="datetime-local"
              class="form-control"
              name="dateSoumission"
              formControlName="dateSoumission"
              placeholder="YYYY-MM-DD HH:mm"
            />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_statut" jhiTranslate="iaevalApp.soumission.statut">Statut</label>
          <select class="form-control" name="statut" formControlName="statut" id="field_statut" data-cy="statut">
            <option [ngValue]="null">{{ 'iaevalApp.StatutEvaluation.null' | translate }}</option>
            @for (statutEvaluation of statutEvaluationValues; track $index) {
              <option [value]="statutEvaluation">{{ 'iaevalApp.StatutEvaluation.' + statutEvaluation | translate }}</option>
            }
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_evaluation" jhiTranslate="iaevalApp.soumission.evaluation">Evaluation</label>
          <select
            class="form-control"
            id="field_evaluation"
            data-cy="evaluation"
            name="evaluation"
            formControlName="evaluation"
            [compareWith]="compareEvaluation"
          >
            <option [ngValue]="null"></option>
            @for (evaluationOption of evaluationsCollection; track $index) {
              <option [ngValue]="evaluationOption">{{ evaluationOption.id }}</option>
            }
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_appelOffre" jhiTranslate="iaevalApp.soumission.appelOffre">Appel Offre</label>
          <select
            class="form-control"
            id="field_appelOffre"
            data-cy="appelOffre"
            name="appelOffre"
            formControlName="appelOffre"
            [compareWith]="compareAppelOffre"
          >
            <option [ngValue]="null"></option>
            @for (appelOffreOption of appelOffresSharedCollection; track $index) {
              <option [ngValue]="appelOffreOption">{{ appelOffreOption.reference }}</option>
            }
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_candidat" jhiTranslate="iaevalApp.soumission.candidat">Candidat</label>
          <select
            class="form-control"
            id="field_candidat"
            data-cy="candidat"
            name="candidat"
            formControlName="candidat"
            [compareWith]="compareCandidat"
          >
            <option [ngValue]="null"></option>
            @for (candidatOption of candidatsSharedCollection; track $index) {
              <option [ngValue]="candidatOption">{{ candidatOption.nom }}</option>
            }
          </select>
        </div>
      </div>

      <div>
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Annuler</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving"
          class="btn btn-primary"
        >
          <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Sauvegarder</span>
        </button>
      </div>
    </form>
  </div>
</div>
