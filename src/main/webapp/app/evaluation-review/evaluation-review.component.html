<div class="row g-0 vh-100 overflow-hidden bg-workspace">
  <!-- COLONNE GAUCHE : NAVIGATION CANDIDATS -->
  <div class="col-md-3 d-flex flex-column border-end bg-white shadow-lg z-1">
    <div class="p-4 border-bottom bg-primary-gradient text-white">
      <h5 class="m-0 fw-bold d-flex align-items-center">
        <fa-icon icon="users" class="me-3"></fa-icon>
        <span>Candidats à l'Offre</span>
      </h5>
    </div>

    <div class="flex-grow-1 overflow-auto custom-scrollbar p-3 bg-light-subtle">
      <div class="list-group list-group-flush gap-2">
        <button
          *ngFor="let eval of evaluations"
          (click)="selectEvaluation(eval)"
          [class.active-eval]="selectedEval?.id === eval.id"
          class="list-group-item list-group-item-action border rounded-4 p-3 transition-all shadow-sm mb-2 border-start-4"
        >
          <div class="d-flex justify-content-between align-items-center">
            <div class="text-truncate">
              <div class="fw-bold text-dark mb-1">{{ eval.soumission?.candidat?.nom || 'Dossier #' + eval.id }}</div>
              <div class="d-flex align-items-center gap-2">
                <fa-icon
                  [icon]="eval.estValidee ? 'check-circle' : 'clock'"
                  [class]="eval.estValidee ? 'text-success' : 'text-warning'"
                ></fa-icon>
                <small class="fw-medium" [class.text-success]="eval.estValidee">
                  {{ eval.estValidee ? 'Validé' : 'À réviser' }}
                </small>
              </div>
            </div>
            <div class="score-badge-pro" [ngClass]="(eval.scoreGlobal ?? 0) >= 50 ? 'pass' : 'fail'">{{ eval.scoreGlobal }}%</div>
          </div>
        </button>
      </div>
    </div>

    <div class="p-4 border-top bg-white mt-auto">
      <button
        class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow-lg"
        [disabled]="!allEvaluationsValidated()"
        (click)="generateGlobalPV()"
      >
        <fa-icon icon="file-signature" class="me-2"></fa-icon>GÉNÉRER LE PV GLOBAL
      </button>
    </div>
  </div>

  <!-- COLONNE DROITE : LE BUREAU (A4) -->
  <div class="col-md-9 h-100 d-flex flex-column overflow-hidden">
    <div *ngIf="selectedEval; else noSelection" class="h-100 d-flex flex-column">
      <!-- TOOLBAR SUPÉRIEURE -->
      <div class="toolbar d-flex justify-content-between align-items-center bg-white px-4 py-3 shadow-sm z-2">
        <div>
          <h4 class="mb-0 fw-bold text-dark">{{ selectedEval.soumission?.candidat?.nom }}</h4>
          <span class="text-muted small fs-7">RÉVISION DE L'ANALYSE IA • ID #{{ selectedEval.id }}</span>
        </div>

        <div class="d-flex gap-3">
          <button class="btn btn-outline-primary rounded-pill px-4" (click)="saveCurrentCorrection()">
            <fa-icon icon="save" class="me-2"></fa-icon> Enregistrer
          </button>
          <button class="btn btn-success rounded-pill px-4 shadow-sm" (click)="validateCurrent()" [disabled]="selectedEval.estValidee">
            <fa-icon icon="check-double" class="me-2"></fa-icon> Valider le PV
          </button>
        </div>
      </div>

      <!-- WORKSPACE (Zone grise avec la feuille) -->
      <div class="flex-grow-1 overflow-auto document-desk p-5">
        <!-- LA FEUILLE A4 -->
        <div class="a4-page shadow-2xl mx-auto mb-5">
          <!-- En-tête de la feuille (Scores) -->
          <div class="row g-0 scores-bar mb-5">
            <div class="col-4 score-box">
              <span class="label">SCORE GLOBAL</span>
              <!--              <div class="value">{{ selectedEval.scoreGlobal }}%</div>-->
              <input
                type="number"
                [ngModel]="selectedEval?.scoreGlobal ?? 0"
                (ngModelChange)="selectedEval!.scoreGlobal = $event"
                class="score-input-inline"
                min="0"
                max="100"
              />
            </div>
            <div class="col-4 score-box border-start border-end">
              <span class="label">NOTE TECHNIQUE</span>
              <!--              <div class="value">{{ selectedEval.scoreTech }}/100</div>-->
              <input
                type="number"
                [ngModel]="selectedEval?.scoreTech ?? 0"
                (ngModelChange)="selectedEval!.scoreTech = $event"
                class="score-input-inline"
                min="0"
                max="100"
              />
            </div>
            <div class="col-4 score-box">
              <span class="label">NOTE ADMIN</span>
              <!--              <input type="number" [(ngModel)]="selectedEval.scoreAdmin/100" class="score-input-inline">-->
              <input
                type="number"
                [ngModel]="selectedEval?.scoreAdmin ?? 0"
                (ngModelChange)="selectedEval!.scoreAdmin = $event"
                class="score-input-inline"
                min="0"
                max="100"
              />
              <!--              <div class="value">{{ selectedEval.scoreAdmin }}/100</div>-->
            </div>
          </div>

          <!-- Corps du Document (Éditeur Quill) -->
          <div class="document-content">
            <!--            <quill-editor-->
            <!--              [(ngModel)]="selectedEval.rapportAnalyse"-->
            <!--              [styles]="{ border: 'none', height: 'auto' }"-->
            <!--              format="html"-->
            <!--              placeholder="Modification du rapport...">-->
            <!--            </quill-editor>-->
            <quill-editor
              *ngIf="selectedEval"
              [(ngModel)]="selectedEval.rapportAnalyse"
              [styles]="{ border: 'none', height: 'auto', minHeight: '800px' }"
              format="html"
            >
            </quill-editor>
          </div>
        </div>
      </div>
    </div>

    <ng-template #noSelection>
      <div class="h-100 d-flex flex-column justify-content-center align-items-center bg-light shadow-inner">
        <div class="text-center opacity-50">
          <fa-icon icon="file-invoice" size="6x" class="text-primary mb-4"></fa-icon>
          <h3 class="fw-bold">Prêt pour la révision</h3>
          <p>Sélectionnez un candidat dans la liste de gauche pour éditer son PV.</p>
        </div>
      </div>
    </ng-template>
  </div>
</div>
